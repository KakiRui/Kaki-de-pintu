<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <title>Kaki拼图工具-禁止二传</title>
    <style>
        :root {
            --bg: #D7DEE4;            
            --panel-bg: rgba(255, 255, 255, 0.9); 
            --text-brown: #333333;    
            --section-header: #A0A0A3; 
            --accent-pink: #C0C0C0;   
            --accent-blue: #DCDCDC;   
            --btn-swap-pink: #5F5F60; 
            --btn-del-bg: #8A8A8A;
            --selected-border: #5F5F60;
            --divider-color: #DCDCDC;
            --section-bg: rgba(215, 222, 228, 0.2); 
            --modal-overlay-bg: rgba(51, 51, 51, 0.7); /* 新增: 模态框背景色变量 */
        }
        body { font-family: 'Palatino', 'Georgia', serif; background-color: var(--bg); color: var(--text-brown); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s; }
        .container { width: 100%; max-width: 600px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--accent-pink); border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(51, 51, 51, 0.1); margin-bottom: 20px; transition: border 0.3s, background 0.3s; }
        h2 { text-align: center; color: var(--text-brown); letter-spacing: 1px; font-weight: normal; margin-top: 0; font-family: 'Dancing Script', cursive; font-size: 2.5rem; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; color: var(--section-header); margin: 0 0 10px 0; padding-bottom: 5px; transition: color 0.3s; }
        
        .section-block { background-color: var(--section-bg); border-radius: 15px; padding: 15px; margin-bottom: 20px; transition: background-color 0.3s; }

        .sub-divider { border-top: 1px solid var(--divider-color); margin: 15px 0; opacity: 0.6; transition: border-top 0.3s; }

        .file-upload-wrapper { position: relative; width: 80px; overflow: hidden; }
        #fileInput, #stickerInput, #textureInput { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .file-label { background: var(--accent-blue); color: var(--gray-btn-text, var(--text-brown)); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; display: inline-block; transition: background 0.3s, color 0.3s; }
        .preview-pool { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; margin-top: 10px; max-height: 200px; overflow: auto; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 12px; border: 1px dashed var(--accent-pink); transition: border 0.3s; }
        
        .thumb-wrapper { position: relative; cursor: pointer; }
        .thumb-wrapper img { width: 100%; height: 65px; object-fit: cover; border-radius: 6px; display: block; transition: border 0.2s, opacity 0.2s; }
        .thumb-badge { position: absolute; top: -6px; right: -6px; background: var(--btn-swap-pink); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; font-family: sans-serif; z-index: 10; transition: background 0.3s; }
        
        .thumb-wrapper.selected img { border: 3px solid var(--selected-border); box-sizing: border-box; opacity: 0.85; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.75rem; margin-bottom: 4px; padding-left: 4px; font-weight: 500;}
        input[type="number"], input[type="text"], select { width: 100%; padding: 10px; border: 1px solid var(--accent-blue); border-radius: 10px; box-sizing: border-box; background: white; color: var(--input-text, var(--text-brown)); outline: none; transition: border 0.3s; }
        input[type="color"] { -webkit-appearance: none; width: 40px; height: 40px; border: 2px solid var(--accent-blue); border-radius: 4px; cursor: pointer; padding: 0; background: none; transition: border 0.3s; }
        input[type="range"] { width: 85%; appearance: none; background: transparent; padding: 0; margin: 15px 0 0 4px; display: block; }
        input[type="range"]::-webkit-slider-runnable-track { height: 6px; background: var(--accent-blue); border-radius: 3px; transition: background 0.3s; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--text-brown); margin-top: -5px; }
        .setting-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent-pink); color: var(--btn-main-text, var(--text-brown)); border: none; border-radius: 20px; font-size: 0.95rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background 0.3s, border 0.2s, color 0.3s; }
        .btn-swap { background: var(--btn-swap-pink); color: var(--btn-swap-text, white); }
        .btn-update { color: var(--update-btn-text, white); border: 1px solid rgba(0,0,0,0.1); background: var(--update-btn-bg, var(--btn-swap-pink)); }

        .toggle-switch { appearance: none; width: 40px; height: 20px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; }
        .toggle-switch:checked { background: var(--accent-pink); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch:checked::after { left: 22px; }
        .font-preview-box { height: 120px; background: var(--accent-blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-top: 10px; border: 1px dashed var(--btn-swap-pink); overflow: hidden; position: relative; transition: background 0.3s, border 0.3s; }
        #previewCanvas, #stickerPreviewCanvas, #texturePreviewCanvas { width: 100%; height: 100%; }
        #resultContainer img { width: 100%; border-radius: 15px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; /* 修改：使用变量 */ background: var(--modal-overlay-bg); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg); padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; transition: background 0.3s; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-del { flex: 1; background: var(--btn-del-bg); color: white; transition: background 0.3s; } 
        .btn-flex-3 { flex: 3; }
        .btn-flex-1 { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Kaki Collage Tool</h2>
        
        <div class="section-block">
            <div class="section-header"><span>切换主题</span></div>
            <select id="themeSelector" onchange="changeTheme()" style="margin-bottom: 0;">
                <option value="gray">格调冷灰 (默认)</option>
                <option value="mint">薄荷生巧</option>
                <option value="rococo">洛可可粉</option>
                <option value="darkPink">黑乳酪莓</option>
            </select>
        </div>

        <div class="section-block">
            <div class="section-header"><span>图片导入</span><div class="file-upload-wrapper"><div class="file-label">选择图片</div><input type="file" id="fileInput" multiple accept="image/*"></div></div>
            <div class="preview-pool" id="pool"></div>
            <div style="margin-top: 15px;">
                <button class="btn-main btn-swap" id="swapBtn" onclick="toggleSwapMode()">调换图片</button>
                <button class="btn-main" style="background:var(--accent-blue); color:var(--gray-btn-text, var(--text-brown))" onclick="clearStorage()">清空已存图片</button>
            </div>
        </div>

        <div class="section-block">
            <div class="section-header"><span>拼图参数</span></div>
            <div class="control-grid">
                <div class="full-width"><label>拼图比例</label><select id="ratioSelect" onchange="toggleRatioInput()"><option value="1:1">1:1 正方形</option><option value="3:4">3:4 竖图</option><option value="9:16">9:16 长屏</option><option value="16:9">16:9 横屏</option><option value="4:3">4:3 横图</option><option value="custom">自定义比例</option></select></div>
                <div id="customRatioUI" class="full-width control-grid" style="display:none; margin-top:5px;"><div><label>宽 (px)</label><input type="number" id="ratioW" value="1"></div><div><label>高 (px)</label><input type="number" id="ratioH" value="1"></div></div>
                <div><label>行数</label><input type="number" id="rows" value="3"></div><div><label>列数</label><input type="number" id="cols" value="3"></div>
                <div class="full-width"><label>导出画质 (20-100%)</label><input type="number" id="quality" value="100" min="20" max="100"></div>
            </div>
        </div>

        <div class="section-block">
            <div class="section-header"><span>编号调整</span><input type="checkbox" class="toggle-switch" id="numEnable" checked onchange="toggleNumSection()"></div>
            <div id="numSettings">
                <div style="margin-bottom: 10px;"><label>起始编号</label><input type="number" id="startNum" value="1" oninput="updatePreview()"></div>
                <div class="setting-row">
                    <div style="flex:2"><label>字体选择</label><select id="fontFamily" onchange="updatePreview()"><option value="sans-serif">系统黑体</option><option value="'Palatino', 'Georgia', serif">复古花体</option><option value="'SimSun', 'STSong', serif">经典宋体</option></select></div>
                    <div style="flex:1"><label>不透明度</label><input type="range" id="fAlpha" value="1" step="0.1" min="0" max="1" oninput="updatePreview()"></div>
                    <div style="flex:0 0 45px; text-align:center"><label>颜色</label><input type="color" id="fColor" value="#FFFFFF" oninput="updatePreview()"></div>
                </div>
                
                <div class="sub-divider"></div>

                <div class="section-header"><span>描边</span><input type="checkbox" class="toggle-switch" id="sEnable" checked onchange="toggleStrokeSection()"></div>
                <div id="strokeSettings" class="setting-row">
                    <div style="flex:2"><label>描边粗细</label><input type="number" id="sWidth" value="15" oninput="updatePreview()"></div>
                    <div style="flex:1"><label>不透明度</label><input type="range" id="sAlpha" value="1" step="0.1" min="0" max="1" oninput="updatePreview()"></div>
                    <div style="flex:0 0 45px; text-align:center"><label>颜色</label><input type="color" id="sColor" value="#000000" oninput="updatePreview()"></div>
                </div>

                <div class="sub-divider"></div>

                <div class="section-header"><span>字体阴影</span><input type="checkbox" class="toggle-switch" id="shEnable" onchange="toggleShadowSection()"></div>
                <div id="shadowSettings" class="setting-row" style="display:none">
                    <div style="flex:1"><label>阴影不透明度</label><input type="range" id="shAlpha" value="0.5" step="0.1" min="0" max="1" oninput="updatePreview()"></div>
                    <div style="flex:0 0 45px; text-align:center"><label>颜色</label><input type="color" id="shColor" value="#000000" oninput="updatePreview()"></div>
                </div>

                <div class="sub-divider"></div>

                <div class="setting-row">
                    <div style="flex:1"><label>编号位置</label><select id="pos" onchange="updatePreview()"><option value="rb">右下</option><option value="cb">正下方</option><option value="lb">左下</option><option value="rt">右上</option><option value="lt">左上</option><option value="cc">中心</option></select></div>
                    <div style="flex:1"><label>编号大小</label><input type="number" id="fSize" value="150" oninput="updatePreview()"></div>
                </div>
                <div class="font-preview-box" id="previewBox"><canvas id="previewCanvas"></canvas></div>
            </div>
        </div>

        <div class="section-block">
            <div class="section-header"><span>底纹设置</span><input type="checkbox" class="toggle-switch" id="textureEnable" onchange="toggleTextureSection()"></div>
            <div id="textureSettings" class="setting-row" style="display:none; align-items: stretch; margin-bottom: 0;">
                <div class="font-preview-box" id="texturePreviewBox" style="flex:1.4; margin-top:0; min-height: 190px; cursor: pointer;" onclick="openTextureModal()">
                    <canvas id="texturePreviewCanvas"></canvas>
                </div>
                <div style="flex:1.2; display:flex; flex-direction:column; justify-content:space-between; padding-left:12px;">
                    <div class="file-upload-wrapper" style="width:100%;">
                        <div class="file-label" style="text-align:center; display:block; padding: 6px;">导入底纹</div>
                        <input type="file" id="textureInput" accept="image/*">
                    </div>
                    <div>
                        <label style="margin-bottom: 2px;">覆盖范围</label>
                        <select id="textureScope" style="padding: 8px; margin-bottom: 2px;">
                            <option value="single">单图 (拼图前)</option>
                            <option value="global">全图 (拼图后)</option>
                        </select>
                    </div>
                    <div>
                        <label style="margin-bottom: 2px;">底纹效果</label>
                        <select id="textureBlendMode" onchange="updateTexturePreview()" style="padding: 8px; margin-bottom: 2px;">
                            <option value="source-over">正常</option>
                            <option value="multiply">正片叠底</option>
                            <option value="screen">滤色</option>
                            <option value="overlay">叠加</option>
                            <option value="soft-light">柔光</option>
                        </select>
                    </div>
                    <div>
                        <label style="margin-bottom: 2px;">不透明度</label>
                        <input type="range" id="textureAlpha" value="0.5" step="0.1" min="0" max="1" oninput="updateTexturePreview()" style="margin: 0 0 0 4px; width: 95%;">
                    </div>
                </div>
            </div>
        </div>

        <div class="section-block">
            <div class="section-header"><span>遮挡图片</span><input type="checkbox" class="toggle-switch" id="soldEnable" onchange="toggleSoldSection()"></div>
            <div id="soldSettings" style="display:none;">
                <div style="margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label style="margin-bottom: 0;">遮挡编号</label>
                        <label style="margin-bottom: 0; display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer; font-size: 0.75rem;">
                            <input type="checkbox" id="soldRemainingMode" onchange="toggleRemainHint()" style="width: auto; margin: 0; accent-color: var(--accent-pink);"> 以余图方式遮挡
                        </label>
                    </div>
                    <input type="text" id="soldNumbers" placeholder="支持逗号/顿号/横杠，如: 1, 2-5, 8、9.10">
                    <div id="remainHint" style="display: none; font-size: 0.7rem; color: var(--section-header); margin-top: 5px; padding-left: 4px; transition: color 0.3s;">*输入的编号为未售出，其余全遮挡</div>
                </div>

                <div class="section-header" style="margin:10px 0;"><span>被遮挡图片显示编号</span><input type="checkbox" class="toggle-switch" id="soldNumEnable" checked></div>
                
                <div class="section-header"><span>自定义遮挡贴纸</span><input type="checkbox" class="toggle-switch" id="stickerEnable" onchange="toggleStickerSection()"></div>
                <div id="stickerSettings" class="setting-row" style="display:none; align-items: stretch; margin-bottom: 0;">
                    <div class="font-preview-box" id="stickerPreviewBox" style="flex:1; margin-top:0; min-height: 160px;">
                        <canvas id="stickerPreviewCanvas"></canvas>
                    </div>
                    <div style="flex:1.5; display:flex; flex-direction:column; justify-content:space-between; padding-left:5px;">
                        <div class="file-upload-wrapper" style="width:100%;">
                            <div class="file-label" style="text-align:center; display:block;">导入贴纸</div>
                            <input type="file" id="stickerInput" accept="image/*">
                        </div>
                        <div><label>贴纸大小 (10-300%)</label><input type="range" id="stickerSize" value="75" min="10" max="300" oninput="updateStickerPreview()"></div>
                        <div><label>贴纸不透明度</label><input type="range" id="stickerAlpha" value="1" step="0.1" min="0" max="1" oninput="updateStickerPreview()"></div>
                    </div>
                </div>
                <button class="btn-main btn-update" style="margin-top: 15px;" id="updateSoldBtn" onclick="generate()">更新拼图</button>
            </div>
        </div>

        <button class="btn-main" style="margin-top: 0;" onclick="generate()">生成拼图</button>
        
        <div id="downloadGroup" style="display:none;">
            <div class="btn-group">
                <button class="btn-main" style="background:var(--accent-blue); color:var(--gray-btn-text, var(--text-brown))" onclick="downloadAllSingle()">单张下载</button>
                <button class="btn-main btn-swap" id="zipDownloadBtn" onclick="downloadZip()">ZIP 打包下载</button>
            </div>
        </div>
    </div>
    <div id="resultContainer"></div>
</div>

<div class="modal-overlay" id="viewModal">
    <div class="modal-box">
        <h3>图片预览</h3>
        <img id="modalImg" style="width:100%;">
        <div class="btn-group">
            <button class="btn-main btn-flex-3" onclick="closeModal('viewModal')">关闭</button>
            <button class="btn-main btn-del btn-flex-1" onclick="deleteCurrentImage()">删除</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="swapModal"><div class="modal-box"><h3>调换排序</h3><p id="swapText"></p><div style="display:flex; gap:10px;"><button class="btn-main btn-swap" onclick="confirmSwap()">确定</button><button class="btn-main" style="background:#ddd" onclick="closeModal('swapModal'); exitSwapMode();">取消</button></div></div></div>

<div class="modal-overlay" id="textureViewModal">
    <div class="modal-box">
        <h3>底纹预览</h3>
        <img id="textureModalImg" style="width:100%; border-radius: 10px; margin-bottom: 10px;">
        <button class="btn-main" onclick="closeModal('textureViewModal')" style="margin-bottom: 0;">关闭</button>
    </div>
</div>

<script>
    let db, currentFiles = [], isSwapMode = false, swapSelection = [], currentPreviewIndex = -1;
    let generatedCanvases = []; 
    let customStickerImg = null;
    let customTextureImg = null; 

    // 修改：为每个主题添加 `modalOverlayBg` 以控制预览背景。
    const themes = {
        gray: {
            bg: '#D7DEE4', accentPink: '#C0C0C0', accentBlue: '#DCDCDC', textBrown: '#333333', btnSwap: '#5F5F60', section: '#A0A0A3', btnDel: '#8A8A8A', selectedBorder: '#5F5F60', divider: '#DCDCDC', sectionBg: 'rgba(215, 222, 228, 0.2)',
            modalOverlayBg: 'rgba(51, 51, 51, 0.7)' /* 默认 */
        },
        mint: {
            bg: '#F9FAF4', accentPink: '#C6DDDC', accentBlue: '#CADED9', textBrown: '#4E342E', btnSwap: '#4E342E', section: '#4E342E', btnDel: '#795548', selectedBorder: '#4E342E', divider: '#E4EFEA', sectionBg: 'rgba(202, 222, 217, 0.15)',
            modalOverlayBg: 'rgba(78, 52, 46, 0.7)'
        },
        rococo: {
            bg: '#FFF1F3', accentPink: '#E8C5C8', accentBlue: '#F1E1E3', textBrown: '#7A5C5C', btnSwap: '#D4A5A5', section: '#D4A5A5', btnDel: '#E08283', selectedBorder: '#D4A5A5', divider: '#F1E1E3', sectionBg: 'rgba(241, 225, 227, 0.2)',
            modalOverlayBg: 'rgba(122, 92, 92, 0.7)'
        },
        darkPink: {
            bg: '#2d2e33',               
            panelBg: '#1F2125', 
            textBrown: '#d97f97',        
            section: '#e2abb4',          
            accentPink: '#d97f97',       
            accentBlue: '#7b7b83',       
            btnSwap: '#d97f97',          
            btnDel: '#7b7b83',           
            selectedBorder: '#d97f97',   
            divider: '#7b7b83',          
            grayBtnText: '#ffffff',      
            inputText: '#8c445a',        
            updateBtnBg: '#7b7b83',      
            updateBtnText: '#ffffff',    
            btnSwapText: '#ffffff',
            btnMainText: '#ffffff',
            sectionBg: 'rgba(123, 123, 131, 0.08)',
            modalOverlayBg: 'rgba(10, 10, 10, 0.8)' /* 修改: 加深黑乳酪莓预览遮罩层 */
        }
    };

    function changeTheme() {
        const selected = document.getElementById('themeSelector').value;
        const t = themes[selected];
        const root = document.documentElement;
        
        root.style.setProperty('--bg', t.bg);
        root.style.setProperty('--panel-bg', t.panelBg || 'rgba(255, 255, 255, 0.9)'); 
        root.style.setProperty('--gray-btn-text', t.grayBtnText || t.textBrown);
        
        root.style.setProperty('--input-text', t.inputText || t.textBrown);
        root.style.setProperty('--update-btn-bg', t.updateBtnBg || t.btnSwap);
        root.style.setProperty('--update-btn-text', t.updateBtnText || 'white');
        root.style.setProperty('--btn-swap-text', t.btnSwapText || 'white');
        root.style.setProperty('--btn-main-text', t.btnMainText || t.textBrown);

        root.style.setProperty('--accent-pink', t.accentPink);
        root.style.setProperty('--accent-blue', t.accentBlue);
        root.style.setProperty('--text-brown', t.textBrown);
        root.style.setProperty('--btn-swap-pink', t.btnSwap);
        root.style.setProperty('--section-header', t.section);
        root.style.setProperty('--btn-del-bg', t.btnDel);
        root.style.setProperty('--selected-border', t.selectedBorder);
        root.style.setProperty('--divider-color', t.divider); 
        root.style.setProperty('--section-bg', t.sectionBg);
        
        /* 修改: changeTheme 函数添加设置 `--modal-overlay-bg` */
        root.style.setProperty('--modal-overlay-bg', t.modalOverlayBg);
    }

    const request = indexedDB.open("KakiDB", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("store"); };
    request.onsuccess = e => { db = e.target.result; loadFromDB(); changeTheme(); }; 

    function saveToDB() { const tx = db.transaction("store", "readwrite"); tx.objectStore("store").put(currentFiles, "imageList"); tx.oncomplete = renderPool; }
    function loadFromDB() { const tx = db.transaction("store", "readonly"); tx.objectStore("store").get("imageList").onsuccess = e => { if(e.target.result) currentFiles = e.target.result; renderPool(); updatePreview(); if(document.getElementById('textureEnable')?.checked) updateTexturePreview(); if(document.getElementById('stickerEnable')?.checked) updateStickerPreview(); }; }

    function renderPool() {
        const pool = document.getElementById('pool'); pool.innerHTML = "";
        currentFiles.forEach((file, index) => {
            const wrapper = document.createElement('div'); wrapper.className = 'thumb-wrapper';
            wrapper.onclick = () => handleThumbClick(index, wrapper);
            const badge = document.createElement('div');
            badge.className = 'thumb-badge';
            badge.innerText = index + 1;
            wrapper.appendChild(badge);
            const img = document.createElement('img'); img.src = URL.createObjectURL(file);
            wrapper.appendChild(img); pool.appendChild(wrapper);
        });
    }

    document.getElementById('fileInput').onchange = (e) => { 
        currentFiles = currentFiles.concat(Array.from(e.target.files)); 
        saveToDB(); 
        e.target.value = ""; 
        if(document.getElementById('textureEnable').checked) updateTexturePreview();
        if(document.getElementById('stickerEnable').checked) updateStickerPreview();
    };
    function clearStorage() { 
        currentFiles = []; 
        saveToDB(); 
        document.getElementById('resultContainer').innerHTML = ""; 
        document.getElementById('downloadGroup').style.display='none'; 
        if(document.getElementById('textureEnable').checked) updateTexturePreview();
        if(document.getElementById('stickerEnable').checked) updateStickerPreview();
    }
    function deleteCurrentImage() { if (currentPreviewIndex > -1) { currentFiles.splice(currentPreviewIndex, 1); saveToDB(); closeModal('viewModal'); if(document.getElementById('textureEnable').checked) updateTexturePreview(); if(document.getElementById('stickerEnable').checked) updateStickerPreview(); } }

    function toggleRatioInput() { document.getElementById('customRatioUI').style.display = (document.getElementById('ratioSelect').value === 'custom') ? 'grid' : 'none'; }
    function toggleNumSection() { document.getElementById('numSettings').style.display = document.getElementById('numEnable').checked ? 'block' : 'none'; updatePreview(); }
    function toggleStrokeSection() { document.getElementById('strokeSettings').style.display = document.getElementById('sEnable').checked ? 'flex' : 'none'; updatePreview(); }
    function toggleShadowSection() { document.getElementById('shadowSettings').style.display = document.getElementById('shEnable').checked ? 'flex' : 'none'; updatePreview(); }
    
    function toggleTextureSection() { 
        document.getElementById('textureSettings').style.display = document.getElementById('textureEnable').checked ? 'flex' : 'none'; 
        if(document.getElementById('textureEnable').checked) setTimeout(updateTexturePreview, 50);
    }
    
    function toggleSoldSection() { document.getElementById('soldSettings').style.display = document.getElementById('soldEnable').checked ? 'block' : 'none'; }
    function toggleStickerSection() { 
        document.getElementById('stickerSettings').style.display = document.getElementById('stickerEnable').checked ? 'flex' : 'none'; 
        if(document.getElementById('stickerEnable').checked) setTimeout(updateStickerPreview, 50);
    }
    
    function toggleRemainHint() {
        document.getElementById('remainHint').style.display = document.getElementById('soldRemainingMode').checked ? 'block' : 'none';
    }

    document.getElementById('textureInput').onchange = async (e) => {
        if(e.target.files.length > 0) {
            customTextureImg = await loadImage(URL.createObjectURL(e.target.files[0]));
            updateTexturePreview();
        }
        e.target.value = "";
    };

    document.getElementById('stickerInput').onchange = async (e) => {
        if(e.target.files.length > 0) {
            customStickerImg = await loadImage(URL.createObjectURL(e.target.files[0]));
            updateStickerPreview();
        }
        e.target.value = "";
    };

    function openTextureModal() {
        const canvas = document.getElementById('texturePreviewCanvas');
        if (!canvas) return;
        document.getElementById('textureModalImg').src = canvas.toDataURL("image/png");
        document.getElementById('textureViewModal').style.display = 'flex';
    }

    async function updateTexturePreview() {
        const canvas = document.getElementById('texturePreviewCanvas');
        const box = document.getElementById('texturePreviewBox');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const rect = box.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, rect.width, rect.height);

        if (currentFiles.length > 0) {
            const firstImg = await loadImage(URL.createObjectURL(currentFiles[0]));
            drawCover(ctx, firstImg, 0, 0, rect.width, rect.height);
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fillRect(0, 0, rect.width, rect.height);
        }

        if (customTextureImg) {
            ctx.save();
            ctx.globalCompositeOperation = document.getElementById('textureBlendMode').value;
            ctx.globalAlpha = parseFloat(document.getElementById('textureAlpha').value);
            drawCover(ctx, customTextureImg, 0, 0, rect.width, rect.height);
            ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.font = "14px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("暂无底纹", rect.width/2, rect.height/2);
        }
    }

    async function updateStickerPreview() {
        const canvas = document.getElementById('stickerPreviewCanvas');
        const box = document.getElementById('stickerPreviewBox');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const rect = box.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, rect.width, rect.height);
        
        if (currentFiles.length > 0) {
            const firstImg = await loadImage(URL.createObjectURL(currentFiles[0]));
            drawCover(ctx, firstImg, 0, 0, rect.width, rect.height);
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fillRect(0, 0, rect.width, rect.height);
        }

        if(customStickerImg) {
            const sizePct = parseInt(document.getElementById('stickerSize').value) / 100;
            const alpha = parseFloat(document.getElementById('stickerAlpha').value);
            let targetW = rect.width * sizePct;
            let targetH = targetW * (customStickerImg.height / customStickerImg.width);
            
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.drawImage(customStickerImg, (rect.width - targetW)/2, (rect.height - targetH)/2, targetW, targetH);
            ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.font = "14px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("暂无贴纸", rect.width/2, rect.height/2);
        }
    }

    function updatePreview() {
        const canvas = document.getElementById('previewCanvas');
        const box = document.getElementById('previewBox');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const rect = box.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, rect.width, rect.height);

        const text = document.getElementById('startNum').value || "1";
        const fSize = parseInt(document.getElementById('fSize').value) || 150;
        const sWidth = document.getElementById('sEnable').checked ? parseInt(document.getElementById('sWidth').value) : 0;
        const previewRatio = rect.width / 1000;
        ctx.save();
        drawComplexText(ctx, text, rect.width, rect.height, fSize * previewRatio, sWidth * previewRatio, true);
        ctx.restore();
    }

    function drawComplexText(ctx, text, w, h, size, sWidth, isPreview = false) {
        const font = document.getElementById('fontFamily').value;
        ctx.font = `bold ${size}px ${font}`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.lineJoin = "round";
        const shadowOffset = document.getElementById('shEnable').checked ? (size * 0.1) : 0;
        const safetyPadding = (size * 0.5) + (sWidth * 0.5) + shadowOffset + 20;
        let cx, cy;
        const pos = document.getElementById('pos').value;
        if (isPreview) { cx = w / 2; cy = h / 2; } 
        else {
            if (pos === 'lt') { cx = safetyPadding; cy = safetyPadding; } 
            else if (pos === 'rt') { cx = w - safetyPadding; cy = safetyPadding; }
            else if (pos === 'lb') { cx = safetyPadding; cy = h - safetyPadding; } 
            else if (pos === 'rb') { cx = w - safetyPadding; cy = h - safetyPadding; }
            else if (pos === 'cb') { cx = w / 2; cy = h - safetyPadding; } 
            else { cx = w/2; cy = h/2; }
        }
        if(document.getElementById('shEnable').checked) {
            const rgb = hexToRgb(document.getElementById('shColor').value);
            ctx.save();
            ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},${document.getElementById('shAlpha').value})`;
            ctx.shadowBlur = size * 0.1; ctx.shadowOffsetX = size * 0.03; ctx.shadowOffsetY = size * 0.03;
            if(sWidth > 0) { ctx.lineWidth = sWidth; ctx.strokeStyle = "black"; ctx.strokeText(text, cx, cy); }
            ctx.fillStyle = "black"; ctx.fillText(text, cx, cy);
            ctx.restore();
        }
        if(sWidth > 0) {
            const rgb = hexToRgb(document.getElementById('sColor').value);
            ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${document.getElementById('sAlpha').value})`;
            ctx.lineWidth = sWidth;
            ctx.strokeText(text, cx, cy);
        }
        const rgbF = hexToRgb(document.getElementById('fColor').value);
        ctx.fillStyle = `rgba(${rgbF.r},${rgbF.g},${rgbF.b},${document.getElementById('fAlpha').value})`;
        ctx.fillText(text, cx, cy);
    }

    function getSoldNumbers() {
        if(!document.getElementById('soldEnable').checked) return new Set();
        let raw = document.getElementById('soldNumbers').value;
        raw = raw.replace(/[.、，。]/g, ',').replace(/[-—_~]/g, '-');
        let parts = raw.split(',');
        let sold = new Set();
        parts.forEach(p => {
            p = p.trim();
            if(!p) return;
            if(p.includes('-')) {
                let [start, end] = p.split('-');
                start = parseInt(start); end = parseInt(end);
                if(!isNaN(start) && !isNaN(end)) {
                    for(let i = Math.min(start, end); i <= Math.max(start, end); i++) sold.add(i);
                }
            } else {
                let num = parseInt(p);
                if(!isNaN(num)) sold.add(num);
            }
        });
        return sold;
    }

    async function generate() {
        if (currentFiles.length === 0) return;
        const container = document.getElementById('resultContainer'); container.innerHTML = "";
        generatedCanvases = []; 
        const rows = parseInt(document.getElementById('rows').value), cols = parseInt(document.getElementById('cols').value);
        const q = parseInt(document.getElementById('quality').value) / 100;
        const rSelect = document.getElementById('ratioSelect').value;
        let rW, rH;
        if(rSelect === 'custom') { rW = document.getElementById('ratioW').value; rH = document.getElementById('ratioH').value; }
        else { [rW, rH] = rSelect.split(':'); }
        const itemW = 1000; const itemH = itemW * (rH / rW);
        const perPage = rows * cols;
        const soldSet = getSoldNumbers();
        const soldRawText = document.getElementById('soldNumbers').value.trim();
        const isRemainMode = document.getElementById('soldRemainingMode').checked;
        const textureScope = document.getElementById('textureScope').value; 

        for (let i = 0; i < currentFiles.length; i += perPage) {
            const canvas = document.createElement('canvas');
            const cRows = Math.ceil(Math.min(currentFiles.length - i, perPage) / cols);
            const cCols = Math.min(currentFiles.length - i, cols);
            canvas.width = cCols * itemW; canvas.height = cRows * itemH;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            for (let j = 0; j < perPage && (i+j) < currentFiles.length; j++) {
                const img = await loadImage(URL.createObjectURL(currentFiles[i+j]));
                const x = (j % cols) * itemW, y = Math.floor(j / cols) * itemH;
                const currentNumber = parseInt(document.getElementById('startNum').value) + i + j;
                
                drawCover(ctx, img, x, y, itemW, itemH);
                
                if (document.getElementById('textureEnable').checked && customTextureImg && textureScope === 'single') {
                    ctx.save();
                    ctx.globalCompositeOperation = document.getElementById('textureBlendMode').value;
                    ctx.globalAlpha = parseFloat(document.getElementById('textureAlpha').value);
                    drawCover(ctx, customTextureImg, x, y, itemW, itemH);
                    ctx.restore();
                }
                
                let isSold = false;
                if(soldRawText !== "") {
                    isSold = isRemainMode ? !soldSet.has(currentNumber) : soldSet.has(currentNumber);
                }

                if(isSold) {
                    if(document.getElementById('stickerEnable').checked && customStickerImg) {
                        const sizePct = parseInt(document.getElementById('stickerSize').value) / 100;
                        const alpha = parseFloat(document.getElementById('stickerAlpha').value);
                        ctx.save();
                        ctx.globalAlpha = alpha;
                        let targetW = itemW * sizePct;
                        let targetH = targetW * (customStickerImg.height / customStickerImg.width);
                        ctx.drawImage(customStickerImg, x + (itemW - targetW)/2, y + (itemH - targetH)/2, targetW, targetH);
                        ctx.restore();
                    } else {
                        ctx.save();
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(x, y, itemW, itemH);
                        const fontSize = itemW * 0.16; 
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.lineJoin = "round";
                        ctx.lineWidth = itemW * 0.02;
                        ctx.strokeStyle = 'black';
                        ctx.fillStyle = 'white';
                        ctx.strokeText("SOLD", x + itemW/2, y + itemH/2 - fontSize*0.6);
                        ctx.fillText("SOLD", x + itemW/2, y + itemH/2 - fontSize*0.6);
                        ctx.strokeText("OUT", x + itemW/2, y + itemH/2 + fontSize*0.6);
                        ctx.fillText("OUT", x + itemW/2, y + itemH/2 + fontSize*0.6);
                        ctx.restore();
                    }
                }

                let drawNum = document.getElementById('numEnable').checked;
                if(isSold && !document.getElementById('soldNumEnable').checked) {
                    drawNum = false;
                }

                if(drawNum) {
                    ctx.save(); ctx.translate(x, y);
                    const sWidth = document.getElementById('sEnable').checked ? parseInt(document.getElementById('sWidth').value) : 0;
                    drawComplexText(ctx, currentNumber, itemW, itemH, parseInt(document.getElementById('fSize').value), sWidth);
                    ctx.restore();
                }
            }

            if (document.getElementById('textureEnable').checked && customTextureImg && textureScope === 'global') {
                ctx.save();
                ctx.globalCompositeOperation = document.getElementById('textureBlendMode').value;
                ctx.globalAlpha = parseFloat(document.getElementById('textureAlpha').value);
                drawCover(ctx, customTextureImg, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            generatedCanvases.push(canvas);
            const resImg = document.createElement('img'); resImg.src = canvas.toDataURL("image/jpeg", q); container.appendChild(resImg);
        }
        document.getElementById('downloadGroup').style.display = 'block';
    }

    async function downloadAllSingle() {
        const q = parseInt(document.getElementById('quality').value) / 100;
        for (let i = 0; i < generatedCanvases.length; i++) {
            const link = document.createElement('a');
            link.download = `Kaki_Collage_${i + 1}.jpg`;
            link.href = generatedCanvases[i].toDataURL("image/jpeg", q);
            link.click();
            await new Promise(resolve => setTimeout(resolve, 500));
        }
    }

    async function downloadZip() {
        const zip = new JSZip();
        const q = parseInt(document.getElementById('quality').value) / 100;
        generatedCanvases.forEach((canvas, i) => {
            const dataUrl = canvas.toDataURL("image/jpeg", q);
            const base64Data = dataUrl.split(',')[1];
            zip.file(`Kaki_Collage_${i + 1}.jpg`, base64Data, {base64: true});
        });
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "Kaki_Collages.zip";
        link.click();
    }

    function drawCover(ctx, img, x, y, w, h) {
        const iR = img.width/img.height, tR = w/h;
        let sx, sy, sw, sh;
        if(iR > tR) { sh = img.height; sw = sh*tR; sx = (img.width-sw)/2; sy = 0; }
        else { sw = img.width; sh = sw/tR; sx = 0; sy = (img.height-sh)/2; }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function hexToRgb(hex) { const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); return {r, g, b}; }
    function loadImage(url) { return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = url; }); }
    
    function handleThumbClick(i, el) { 
        if(isSwapMode){ 
            if(swapSelection.includes(i))return; 
            swapSelection.push(i); 
            el.classList.add('selected'); 
            if(swapSelection.length===2){ 
                document.getElementById('swapText').innerText=`交换第 ${swapSelection[0]+1} 张和第 ${swapSelection[1]+1} 张？`; 
                document.getElementById('swapModal').style.display='flex'; 
            } 
        }else{ 
            currentPreviewIndex = i;
            document.getElementById('modalImg').src=URL.createObjectURL(currentFiles[i]); 
            document.getElementById('viewModal').style.display='flex'; 
        }
    }

    function toggleSwapMode() { isSwapMode = !isSwapMode; swapSelection = []; renderPool(); document.getElementById('swapBtn').innerText = isSwapMode ? "请点击两张图" : "调换图片"; }
    function confirmSwap() { const [i, j] = swapSelection; [currentFiles[i], currentFiles[j]] = [currentFiles[j], currentFiles[i]]; closeModal('swapModal'); exitSwapMode(); saveToDB(); if(document.getElementById('textureEnable').checked) updateTexturePreview(); if(document.getElementById('stickerEnable').checked) updateStickerPreview(); }
    function exitSwapMode() { isSwapMode = false; document.getElementById('swapBtn').innerText = "调换图片"; swapSelection = []; renderPool(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; if(id==='viewModal') currentPreviewIndex = -1; }
    
    setTimeout(updatePreview, 100);
</script>
