<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rococo Atelier | 洛可可拼图工坊</title>
    <style>
        :root {
            --palace-white: #F9F7F2;
            --royal-gold: #C5A059;
            --sage-green: #8A9A5B;
            --silk-grey: #E5E1D8;
            --text-main: #4A453C;
        }

        body { 
            font-family: 'Optima', 'PingFang SC', serif; 
            background: var(--palace-white); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 600px; }
        
        /* 高级感面板 */
        .panel {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--silk-grey);
            border-radius: 4px; padding: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            margin-bottom: 24px; backdrop-filter: blur(10px);
        }

        h2 { 
            text-align: center; color: var(--royal-gold); 
            letter-spacing: 4px; font-weight: 300; text-transform: uppercase;
            border-bottom: 1px solid var(--silk-grey); padding-bottom: 15px;
        }

        /* 素材展示区 */
        .asset-library {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px; margin: 15px 0; max-height: 150px; overflow-y: auto;
            border: 1px inset var(--silk-grey); padding: 10px; background: #fff;
        }
        .asset-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px; }

        .section-title { font-size: 12px; color: var(--royal-gold); margin-top: 20px; border-left: 2px solid var(--royal-gold); padding-left: 8px; }

        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .control-item { display: flex; flex-direction: column; gap: 4px; }
        
        label { font-size: 11px; color: #888; text-transform: uppercase; }
        
        input, select {
            border: none; border-bottom: 1px solid var(--silk-grey);
            background: transparent; padding: 8px 0; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom: 1px solid var(--royal-gold); }

        /* 开关设计 */
        .switch-row { flex-direction: row; align-items: center; justify-content: space-between; padding: 10px 0; }

        button.main-btn {
            width: 100%; margin-top: 30px; padding: 16px;
            background: var(--royal-gold); color: white; border: none;
            letter-spacing: 2px; font-weight: bold; cursor: pointer;
            transition: all 0.4s ease;
        }
        button.main-btn:hover { filter: brightness(1.1); }
        button.secondary-btn { background: #eee; color: #666; font-size: 12px; padding: 5px; margin-top: 5px; cursor: pointer; border:none; }

        #resultContainer img { width: 100%; margin-top: 20px; border: 8px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Atelier</h2>
        
        <div class="control-item">
            <label>Upload Collection</label>
            <input type="file" id="fileInput" multiple accept="image/*">
            <div class="asset-library" id="assetLib"></div>
            <button class="secondary-btn" onclick="clearData()">清空所有缓存图片</button>
        </div>

        <p class="section-title">Layout / 布局</p>
        <div class="control-row">
            <div class="control-item"><label>Rows</label><input type="number" id="rows" value="3"></div>
            <div class="control-item"><label>Cols</label><input type="number" id="cols" value="3"></div>
        </div>
        <div class="control-row">
            <div class="control-item">
                <label>Aspect Ratio (W:H)</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="ratioW" value="1" step="0.1">
                    <input type="number" id="ratioH" value="1" step="0.1">
                </div>
            </div>
            <div class="control-item"><label>Quality (0.2-1.0)</label><input type="range" id="quality" min="0.2" max="1" step="0.1" value="0.8"></div>
        </div>

        <p class="section-title">Typography / 字体</p>
        <div class="control-row">
            <div class="control-item"><label>Start No.</label><input type="number" id="startNum" value="1"></div>
            <div class="control-item"><label>Font Size</label><input type="number" id="fontSize" value="45"></div>
        </div>
        <div class="control-row">
            <div class="control-item"><label>Font Color</label><input type="color" id="fontColor" value="#FFFFFF"></div>
            <div class="control-item"><label>Position</label>
                <select id="pos">
                    <option value="lt">Top-Left</option><option value="lb">Bottom-Left</option>
                    <option value="cc">Center</option><option value="rb" selected>Bottom-Right</option>
                </select>
            </div>
        </div>

        <p class="section-title">Stroke & Effects / 描边与阴影</p>
        <div class="control-row">
            <div class="control-item switch-row">
                <label>Enable Stroke</label><input type="checkbox" id="strokeEnable" checked>
            </div>
            <div class="control-item"><label>Stroke Color</label><input type="color" id="strokeColor" value="#000000"></div>
        </div>

        <button class="main-btn" onclick="generate()">GENERATE ARTWORK</button>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    let db;
    // 初始化数据库
    const request = indexedDB.open("RococoAtelier", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("images", { autoIncrement: true });
    request.onsuccess = e => { db = e.target.result; displayAssets(); };

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        const tx = db.transaction("images", "readwrite");
        const store = tx.objectStore("images");
        for (let f of files) store.add(f);
        tx.oncomplete = displayAssets;
    };

    async function displayAssets() {
        const lib = document.getElementById('assetLib');
        lib.innerHTML = "";
        const tx = db.transaction("images", "readonly");
        const store = tx.objectStore("images");
        const cursor = store.openCursor();
        cursor.onsuccess = e => {
            const res = e.target.result;
            if (res) {
                const img = document.createElement('img');
                img.className = 'asset-thumb';
                img.src = URL.createObjectURL(res.value);
                lib.appendChild(img);
                res.continue();
            }
        };
    }

    function clearData() {
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").clear();
        tx.oncomplete = () => { location.reload(); };
    }

    async function generate() {
        const tx = db.transaction("images", "readonly");
        const images = [];
        const cursor = tx.objectStore("images").openCursor();
        cursor.onsuccess = async e => {
            const res = e.target.result;
            if (res) { images.push(res.value); res.continue(); }
            else { proceed(images); }
        };
    }

    async function proceed(files) {
        if (files.length === 0) return alert("素材库空空如也哦~");
        const container = document.getElementById('resultContainer');
        container.innerHTML = "Processing...";

        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const rW = parseFloat(document.getElementById('ratioW').value);
        const rH = parseFloat(document.getElementById('ratioH').value);
        const quality = parseFloat(document.getElementById('quality').value);
        const startNum = parseInt(document.getElementById('startNum').value);
        
        const itemW = 500; // 固定基础宽度
        const itemH = itemW * (rH / rW);
        const perPage = rows * cols;

        for (let i = 0; i < files.length; i += perPage) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = cols * itemW;
            canvas.height = rows * itemH;

            for (let j = 0; j < perPage; j++) {
                const idx = i + j;
                if (idx >= files.length) break;
                const img = await loadImage(URL.createObjectURL(files[idx]));
                const c = j % cols;
                const r = Math.floor(j / cols);
                drawCover(ctx, img, c * itemW, r * itemH, itemW, itemH);
                drawText(ctx, startNum + idx, c * itemW, r * itemH, itemW, itemH);
            }
            const resImg = document.createElement('img');
            resImg.src = canvas.toDataURL('image/jpeg', quality);
            container.appendChild(resImg);
        }
        container.firstChild.textContent = "";
    }

    function loadImage(url) { return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = url; }); }

    function drawCover(ctx, img, x, y, w, h) {
        const iR = img.width / img.height;
        const tR = w / h;
        let sx, sy, sw, sh;
        if (iR > tR) { sh = img.height; sw = sh * tR; sx = (img.width - sw) / 2; sy = 0; }
        else { sw = img.width; sh = sw / tR; sx = 0; sy = (img.height - sh) / 2; }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function drawText(ctx, text, x, y, w, h) {
        const size = parseInt(document.getElementById('fontSize').value);
        const color = document.getElementById('fontColor').value;
        const pos = document.getElementById('pos').value;
        const strokeOn = document.getElementById('strokeEnable').checked;
        const strokeColor = document.getElementById('strokeColor').value;

        ctx.font = `bold ${size}px 'Optima', sans-serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        
        let tx, ty, pad = size * 0.8;
        if (pos === 'lt') { tx = x + pad; ty = y + pad; }
        else if (pos === 'lb') { tx = x + pad; ty = y + h - pad; }
        else if (pos === 'rb') { tx = x + w - pad; ty = y + h - pad; }
        else { tx = x + w/2; ty = y + h/2; }

        if (strokeOn) {
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = size / 5;
            ctx.strokeText(text, tx, ty);
        }
        ctx.fillStyle = color;
        ctx.fillText(text, tx, ty);
    }
</script>
</body>
</html>
