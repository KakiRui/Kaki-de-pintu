<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaki拼图工具-禁止二传</title>
    <style>
        :root {
            --bg: #FDF8F5; /* 极淡奶油粉 */
            --accent-pink: #F2D7D9; /* 洛可可粉 */
            --accent-blue: #D3E0EA; /* 洛可可蓝 */
            --text-brown: #766161; /* 复古深粉棕 */
            --btn-swap: #E2BCB7; /* 调换按钮粉 */
            --panel-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Palatino', 'Georgia', serif; 
            background-color: var(--bg); 
            color: var(--text-brown);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(118, 97, 97, 0.05);
            margin-bottom: 20px;
        }

        h2 { text-align: center; color: var(--text-brown); letter-spacing: 2px; font-weight: normal; margin-top: 0; font-family: 'Georgia', serif; }

        .section-header { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; font-weight: bold; color: #B59F9F; 
            margin: 18px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--accent-pink); 
        }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: var(--text-brown); }
        
        input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid var(--accent-blue);
            border-radius: 12px; box-sizing: border-box; background: white;
            color: var(--text-brown); outline: none; transition: 0.3s; font-size: 0.85rem;
        }

        /* 隐藏原生文件上传文字 */
        .file-upload-wrapper { position: relative; width: 80px; height: 30px; }
        #fileInput { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .file-custom-btn { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--accent-blue); border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-brown);
        }

        /* 颜色选择器改成正方形 */
        input[type="color"] {
            -webkit-appearance: none; width: 40px; height: 40px; border: 2px solid var(--accent-blue);
            border-radius: 8px; cursor: pointer; padding: 0; background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

        /* 素材池 */
        .preview-pool {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px; margin-top: 10px; max-height: 220px; overflow-y: auto;
            background: #FFF; padding: 12px; border-radius: 15px; border: 1px solid var(--accent-pink);
        }
        .thumb-wrapper { position: relative; cursor: pointer; }
        .thumb-wrapper.swap-active { border: 2px solid var(--text-brown); border-radius: 8px; transform: scale(0.9); }
        .thumb-wrapper img { width: 100%; height: 70px; object-fit: cover; border-radius: 8px; }
        .thumb-badge {
            position: absolute; top: -4px; right: -4px; background: var(--text-brown);
            color: white; font-size: 0.6rem; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        /* 按钮 */
        .btn-main {
            width: 100%; padding: 14px; background: var(--accent-pink);
            color: var(--text-brown); border: none; border-radius: 18px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-swap { background: var(--btn-swap); margin-bottom: 10px; }
        .btn-swap.active { background: var(--text-brown); color: white; }
        .btn-clear { background: #eee; font-size: 0.8rem; height: 40px; }

        .font-preview-box {
            height: 80px; background: white; border-radius: 15px; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--accent-pink);
        }

        /* 弹窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(118, 97, 97, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-box {
            background: var(--bg); padding: 25px; border-radius: 25px;
            width: 80%; max-width: 320px; text-align: center; border: 1px solid var(--accent-pink);
        }
        .modal-box img { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        #resultContainer img { width: 100%; border-radius: 20px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Kaki Puzzle Tool</h2>
        
        <div class="section-header">
            <span>图片导入</span>
            <div class="file-upload-wrapper">
                <div class="file-custom-btn">选择图片</div>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>
        </div>
        <div class="preview-pool" id="pool"></div>
        
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn-main btn-swap" id="swapBtn" style="flex: 2;" onclick="toggleSwapMode()">调换图片</button>
            <button class="btn-main btn-clear" style="flex: 1;" onclick="clearStorage()">清空</button>
        </div>

        <div class="section-header"><span>拼图参数</span></div>
        <div class="control-grid">
            <div class="full-width">
                <label>比例选择</label>
                <select id="ratioPreset" onchange="updateRatioFields()">
                    <option value="1:1">1:1 正方形</option>
                    <option value="9:16">9:16 长屏</option>
                    <option value="3:4">3:4 复古人像</option>
                    <option value="custom">自定义比例 (px)</option>
                </select>
            </div>
            <div id="customRatioW" style="display:none;"><label>自定义宽 (px)</label><input type="number" id="ratioW" value="400"></div>
            <div id="customRatioH" style="display:none;"><label>自定义高 (px)</label><input type="number" id="ratioH" value="400"></div>
            
            <div><label>单图列数</label><input type="number" id="cols" value="3"></div>
            <div><label>单图行数 (最大)</label><input type="number" id="rows" value="3"></div>
            <div class="full-width"><label>导出质量 (20-100%)</label><input type="number" id="quality" value="90"></div>
        </div>

        <div class="section-header">
            <span>编号调整</span>
            <input type="checkbox" id="numEnable" checked onchange="toggleNumSection()">
        </div>
        
        <div id="numSettings">
            <div class="control-grid">
                <div><label>起始编号</label><input type="number" id="startNum" value="1" oninput="updatePreview()"></div>
                <div><label>字体大小</label><input type="number" id="fSize" value="40" oninput="updatePreview()"></div>
                
                <div><label>字体颜色</label><input type="color" id="fColor" value="#000000" oninput="updatePreview()"></div>
                <div><label>字体透明度</label><input type="range" id="fAlpha" min="0" max="1" step="0.1" value="1" oninput="updatePreview()"></div>
                
                <div><label>开启描边</label><select id="sEnable" onchange="updatePreview()"><option value="no">关闭</option><option value="yes">开启</option></select></div>
                <div><label>描边颜色</label><input type="color" id="sColor" value="#000000" oninput="updatePreview()"></div>
                
                <div class="full-width"><label>描边粗细</label><input type="range" id="sWeight" min="1" max="15" value="5" oninput="updatePreview()"></div>
                
                <div><label>编号位置</label><select id="pos"><option value="rb">右下</option><option value="lb">左下</option><option value="cc">中心</option><option value="lt">左上</option></select></div>
                <div><label>字体阴影</label><select id="shEnable" onchange="updatePreview()"><option value="no">无</option><option value="yes">有</option></select></div>
            </div>
            <div class="font-preview-box" id="previewBox"><span id="previewText">1</span></div>
        </div>

        <button class="btn-main" style="margin-top: 20px; background: var(--text-brown); color: white;" onclick="generate()">生成拼图</button>
    </div>
    <div id="resultContainer"></div>
</div>

<div class="modal-overlay" id="viewModal"><div class="modal-box"><h3>预览与替换</h3><img id="modalImg"><input type="file" id="replaceInput" style="display:none" onchange="handleReplaceFile(event)"><div style="display:flex;gap:10px;"><button class="btn-main" onclick="document.getElementById('replaceInput').click()">替换</button><button class="btn-main" style="background:#ddd" onclick="closeModal('viewModal')">关闭</button></div></div></div>
<div class="modal-overlay" id="swapModal"><div class="modal-box"><h3>确认调换</h3><p id="swapText"></p><div style="display:flex;gap:10px;"><button class="btn-main" onclick="confirmSwap()">确定</button><button class="btn-main" style="background:#ddd" onclick="closeModal('swapModal');exitSwapMode();">取消</button></div></div></div>

<script>
    let db, currentFiles = [], isSwapMode = false, swapSelection = [], currentViewIndex = -1;

    // 数据库与基础初始化
    const request = indexedDB.open("KakiDBV5", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("store");
    request.onsuccess = e => { db = e.target.result; loadFromDB(); updatePreview(); };

    function loadFromDB() {
        const tx = db.transaction("store", "readonly");
        tx.objectStore("store").get("imageList").onsuccess = e => { if(e.target.result) currentFiles = e.target.result; renderPool(); };
    }

    function saveToDB() {
        const tx = db.transaction("store", "readwrite");
        tx.objectStore("store").put(currentFiles, "imageList");
        tx.oncomplete = renderPool;
    }

    function renderPool() {
        const pool = document.getElementById('pool');
        pool.innerHTML = "";
        currentFiles.forEach((file, index) => {
            const wrap = document.createElement('div'); wrap.className = 'thumb-wrapper';
            wrap.onclick = () => handleThumbClick(index, wrap);
            const img = document.createElement('img'); img.src = URL.createObjectURL(file);
            const badge = document.createElement('div'); badge.className = 'thumb-badge'; badge.innerText = index + 1;
            wrap.append(img, badge); pool.append(wrap);
        });
    }

    document.getElementById('fileInput').onchange = e => {
        currentFiles = currentFiles.concat(Array.from(e.target.files));
        saveToDB();
    };

    function updateRatioFields() {
        const isCustom = document.getElementById('ratioPreset').value === 'custom';
        document.getElementById('customRatioW').style.display = isCustom ? 'block' : 'none';
        document.getElementById('customRatioH').style.display = isCustom ? 'block' : 'none';
    }

    function handleThumbClick(index, el) {
        if (isSwapMode) {
            if (swapSelection.includes(index)) return;
            swapSelection.push(index); el.classList.add('swap-active');
            if (swapSelection.length === 2) {
                document.getElementById('swapText').innerText = `调换第 ${swapSelection[0]+1} 张与第 ${swapSelection[1]+1} 张的位置？`;
                document.getElementById('swapModal').style.display = 'flex';
            }
        } else {
            currentViewIndex = index;
            document.getElementById('modalImg').src = URL.createObjectURL(currentFiles[index]);
            document.getElementById('viewModal').style.display = 'flex';
        }
    }

    function toggleSwapMode() {
        isSwapMode = !isSwapMode;
        const btn = document.getElementById('swapBtn');
        btn.innerText = isSwapMode ? "请选择两张图片" : "调换图片";
        btn.classList.toggle('active', isSwapMode);
        swapSelection = []; renderPool();
    }

    function confirmSwap() {
        const [i, j] = swapSelection;
        [currentFiles[i], currentFiles[j]] = [currentFiles[j], currentFiles[i]];
        closeModal('swapModal'); exitSwapMode(); saveToDB();
    }

    function exitSwapMode() { isSwapMode = false; document.getElementById('swapBtn').innerText = "调换图片"; document.getElementById('swapBtn').classList.remove('active'); swapSelection = []; renderPool(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function clearStorage() { currentFiles = []; saveToDB(); }
    function toggleNumSection() { document.getElementById('numSettings').style.display = document.getElementById('numEnable').checked ? 'block' : 'none'; }

    function handleReplaceFile(e) {
        if(e.target.files[0]) { currentFiles[currentViewIndex] = e.target.files[0]; saveToDB(); closeModal('viewModal'); }
    }

    function updatePreview() {
        const text = document.getElementById('previewText');
        const color = document.getElementById('fColor').value;
        const alpha = document.getElementById('fAlpha').value;
        const size = document.getElementById('fSize').value;
        const stroke = document.getElementById('sColor').value;
        const weight = document.getElementById('sWeight').value / 2;

        text.innerText = document.getElementById('startNum').value;
        text.style.fontSize = size + 'px';
        text.style.fontFamily = 'Georgia, serif';
        
        // 转换RGBA
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        text.style.color = `rgba(${r},${g},${b},${alpha})`;
        
        let shadows = [];
        if (document.getElementById('sEnable').value === 'yes') {
            shadows.push(`-${weight}px -${weight}px 0 ${stroke}, ${weight}px -${weight}px 0 ${stroke}, -${weight}px ${weight}px 0 ${stroke}, ${weight}px ${weight}px 0 ${stroke}`);
        }
        if (document.getElementById('shEnable').value === 'yes') shadows.push('3px 6px 10px rgba(0,0,0,0.3)');
        text.style.textShadow = shadows.join(',') || 'none';
    }

    async function generate() {
        if (!currentFiles.length) return;
        const container = document.getElementById('resultContainer');
        container.innerHTML = "Processing...";
        
        // 获取比例
        let w, h;
        const preset = document.getElementById('ratioPreset').value;
        if(preset === '1:1') { w=400; h=400; }
        else if(preset === '9:16') { w=450; h=800; }
        else if(preset === '3:4') { w=450; h=600; }
        else { w=document.getElementById('ratioW').value; h=document.getElementById('ratioH').value; }

        const maxRows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const perPage = maxRows * cols;
        const quality = document.getElementById('quality').value / 100;
        const isNum = document.getElementById('numEnable').checked;
        const start = parseInt(document.getElementById('startNum').value);

        container.innerHTML = "";

        for (let i = 0; i < currentFiles.length; i += perPage) {
            const pageImgs = currentFiles.slice(i, i + perPage);
            // 核心逻辑：智能行数
            const actualRows = Math.ceil(pageImgs.length / cols);
            
            const canvas = document.createElement('canvas');
            canvas.width = cols * w;
            canvas.height = actualRows * h;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);

            for (let j = 0; j < pageImgs.length; j++) {
                const img = await new Promise(r => { const img=new Image(); img.onload=()=>r(img); img.src=URL.createObjectURL(pageImgs[j]); });
                const curX = (j % cols) * w, curY = Math.floor(j / cols) * h;
                
                // Cover draw
                const iR = img.width/img.height, tR = w/h;
                let sx, sy, sw, sh;
                if(iR > tR) { sh=img.height; sw=sh*tR; sx=(img.width-sw)/2; sy=0; }
                else { sw=img.width; sh=sw/tR; sx=0; sy=(img.height-sh)/2; }
                ctx.drawImage(img, sx, sy, sw, sh, curX, curY, w, h);

                if(isNum) {
                    const size = parseInt(document.getElementById('fSize').value);
                    const color = document.getElementById('fColor').value;
                    const alpha = document.getElementById('fAlpha').value;
                    const pos = document.getElementById('pos').value;
                    const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
                    
                    ctx.save();
                    ctx.font = `bold ${size}px Georgia, serif`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    
                    let tx, ty, p = size*0.8;
                    if(pos==='rb') { tx=curX+w-p; ty=curY+h-p; }
                    else if(pos==='lb') { tx=curX+p; ty=curY+h-p; }
                    else if(pos==='lt') { tx=curX+p; ty=curY+p; }
                    else { tx=curX+w/2; ty=curY+h/2; }

                    if(document.getElementById('sEnable').value === 'yes') {
                        ctx.strokeStyle = document.getElementById('sColor').value;
                        ctx.lineWidth = document.getElementById('sWeight').value;
                        ctx.strokeText(start + i + j, tx, ty);
                    }
                    if(document.getElementById('shEnable').value === 'yes') {
                        ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 10;
                    }
                    ctx.fillText(start + i + j, tx, ty);
                    ctx.restore();
                }
            }
            const res = document.createElement('img'); res.src = canvas.toDataURL("image/jpeg", quality);
            container.appendChild(res);
        }
    }
</script>
</body>
</html>
