<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kaki拼图工具-禁止二传</title>
    <style>
        :root {
            --bg: #FDF9F6; 
            --rose: #E8B4B8; /* 灰调玫瑰 */
            --blue: #CEDEE0; /* 粉彩青 */
            --brown: #846D62; /* 午茶棕 */
            --ivory: #FFFFFF;
        }

        body { 
            font-family: serif; 
            background-color: var(--bg); 
            color: var(--brown);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 550px; }

        .panel {
            background: var(--ivory);
            border: 1px solid var(--blue);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(132, 109, 98, 0.08);
            margin-bottom: 25px;
        }

        h2 { text-align: center; letter-spacing: 3px; font-weight: normal; margin: 0 0 20px; font-size: 1.6rem; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--rose); margin: 20px 0 10px; border-bottom: 1px solid #F0E6E1; padding-bottom: 5px; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-row { grid-column: span 2; }
        
        label { display: block; font-size: 0.8rem; margin-bottom: 6px; }

        input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid var(--blue);
            border-radius: 8px; background: #FBFAFA; color: var(--brown); font-family: serif;
        }

        /* 隐藏原生上传，自定义按钮 */
        .upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .btn-upload {
            display: block; width: 100%; padding: 12px; background: var(--blue);
            color: var(--brown); text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.9rem;
        }
        #fileInput { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; }

        /* 正方形颜色选择器 */
        input[type="color"] {
            -webkit-appearance: none; border: 1px solid var(--blue);
            width: 35px; height: 35px; padding: 0; border-radius: 4px; cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

        .color-group { display: flex; align-items: center; gap: 10px; }

        /* 素材预览 */
        .preview-pool {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 10px; margin-top: 15px; max-height: 120px; overflow-y: auto;
            background: #F9F9F9; padding: 10px; border-radius: 10px; border: 1px dashed var(--blue);
        }
        .preview-pool img { width: 100%; height: 55px; object-fit: cover; border-radius: 4px; }

        .btn-main {
            width: 100%; padding: 15px; background: var(--rose);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; cursor: pointer; margin-top: 20px;
            transition: 0.3s; box-shadow: 0 4px 12px rgba(232, 180, 184, 0.4);
        }
        .btn-secondary { background: var(--blue); color: var(--brown); box-shadow: none; margin-top: 10px; font-size: 0.85rem; }

        #resultContainer img { width: 100%; border-radius: 12px; margin-top: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Rococo Atelier</h2>
        
        <div class="section-title">素材整备</div>
        <div class="upload-wrapper">
            <div class="btn-upload">选取图片</div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <div class="preview-pool" id="pool"></div>
        <button class="btn-main btn-secondary" onclick="clearStorage()">调换图片</button>

        <div class="section-title">拼图参数</div>
        <div class="control-grid">
            <div><label>起始编号</label><input type="number" id="startNum" value="1"></div>
            <div><label>画质 (20-100%)</label><input type="number" id="quality" value="85"></div>
            <div><label>行数</label><input type="number" id="rows" value="3"></div>
            <div><label>列数</label><input type="number" id="cols" value="3"></div>
            <div class="full-row">
                <label>比例选择</label>
                <select id="ratioPreset" onchange="toggleRatio()">
                    <option value="1:1">1:1 正方形</option>
                    <option value="9:16">9:16 纵向</option>
                    <option value="3:4">3:4 人像</option>
                    <option value="custom">自定义比例 (px)</option>
                </select>
            </div>
            <div id="customRatio" class="full-row hidden">
                <div class="control-grid">
                    <div><label>宽度 (px)</label><input type="number" id="cW" value="800"></div>
                    <div><label>高度 (px)</label><input type="number" id="cH" value="800"></div>
                </div>
            </div>
        </div>

        <div class="section-title">编号调整</div>
        <div class="control-grid">
            <div class="color-group">
                <input type="color" id="fColor" value="#ffffff">
                <label>字体颜色</label>
            </div>
            <div><label>不透明度 (0.1-1)</label><input type="number" id="fAlpha" value="1" step="0.1" min="0.1" max="1"></div>
            <div class="full-row"><label>字体大小</label><input type="number" id="fSize" value="45"></div>
            
            <div class="color-group">
                <select id="sEnable" onchange="toggleStroke()">
                    <option value="no">描边关</option>
                    <option value="yes">描边开</option>
                </select>
            </div>
            <div id="strokeSettings" class="color-group hidden">
                <input type="color" id="sColor" value="#000000">
                <input type="number" id="sWidth" value="5" style="width: 60px;" title="粗细">
            </div>

            <div class="full-row">
                <label>编号位置</label>
                <select id="pos">
                    <option value="rb">右下角</option><option value="lb">左下角</option>
                    <option value="rt">右上角</option><option value="lt">左上角</option>
                    <option value="cc">正中心</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="generate()">开始生成拼图</button>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    let db;
    const request = indexedDB.open("RococoAtelierDB", 2);
    request.onupgradeneeded = e => e.target.result.createObjectStore("images", { autoIncrement: true });
    request.onsuccess = e => { db = e.target.result; loadFromDB(); };

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        const tx = db.transaction("images", "readwrite");
        const store = tx.objectStore("images");
        for (const f of files) store.add(f);
        tx.oncomplete = loadFromDB;
    };

    async function loadFromDB() {
        const pool = document.getElementById('pool');
        pool.innerHTML = "";
        const tx = db.transaction("images", "readonly");
        tx.objectStore("images").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(cursor.value);
                pool.appendChild(img);
                cursor.continue();
            }
        };
    }

    function clearStorage() {
        db.transaction("images", "readwrite").objectStore("images").clear().onsuccess = () => location.reload();
    }

    function toggleRatio() {
        document.getElementById('customRatio').classList.toggle('hidden', document.getElementById('ratioPreset').value !== 'custom');
    }

    function toggleStroke() {
        document.getElementById('strokeSettings').classList.toggle('hidden', document.getElementById('sEnable').value !== 'yes');
    }

    async function generate() {
        const images = [];
        const tx = db.transaction("images", "readonly");
        tx.objectStore("images").openCursor().onsuccess = async e => {
            const cursor = e.target.result;
            if (cursor) { images.push(cursor.value); cursor.continue(); }
            else { draw(images); }
        };
    }

    async function draw(imageFiles) {
        if (imageFiles.length === 0) return;
        const container = document.getElementById('resultContainer');
        container.innerHTML = "";
        
        const preset = document.getElementById('ratioPreset').value;
        let itemW, itemH;
        if (preset === 'custom') {
            itemW = parseInt(document.getElementById('cW').value);
            itemH = parseInt(document.getElementById('cH').value);
        } else {
            const r = preset.split(':');
            itemW = 600; 
            itemH = itemW * (r[1]/r[0]);
        }

        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const perPage = rows * cols;

        for (let i = 0; i < imageFiles.length; i += perPage) {
            const remaining = imageFiles.length - i;
            const currentRows = Math.min(rows, Math.ceil(remaining / cols));
            const currentCols = Math.min(cols, remaining > cols ? cols : remaining);
            
            const canvas = document.createElement('canvas');
            canvas.width = currentCols * itemW;
            canvas.height = currentRows * itemH;
            const ctx = canvas.getContext('2d');

            for (let j = 0; j < Math.min(perPage, remaining); j++) {
                const img = await loadImage(URL.createObjectURL(imageFiles[i + j]));
                const x = (j % cols) * itemW;
                const y = Math.floor(j / cols) * itemH;
                
                // Cover logic
                const iR = img.width / img.height, tR = itemW / itemH;
                let sx, sy, sw, sh;
                if (iR > tR) { sh = img.height; sw = sh * tR; sx = (img.width - sw) / 2; sy = 0; }
                else { sw = img.width; sh = sw / tR; sx = 0; sy = (img.height - sh) / 2; }
                ctx.drawImage(img, sx, sy, sw, sh, x, y, itemW, itemH);

                // Text logic
                const size = parseInt(document.getElementById('fSize').value);
                const alpha = document.getElementById('fAlpha').value;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.font = `bold ${size}px serif`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                
                let tx, ty, p = size * 0.8;
                const pos = document.getElementById('pos').value;
                if (pos === 'lt') { tx = x + p; ty = y + p; }
                else if (pos === 'rt') { tx = x + itemW - p; ty = y + p; }
                else if (pos === 'lb') { tx = x + p; ty = y + itemH - p; }
                else if (pos === 'rb') { tx = x + itemW - p; ty = y + itemH - p; }
                else { tx = x + itemW/2; ty = y + itemH/2; }

                if(document.getElementById('sEnable').value === 'yes') {
                    ctx.strokeStyle = document.getElementById('sColor').value;
                    ctx.lineWidth = parseInt(document.getElementById('sWidth').value);
                    ctx.strokeText(parseInt(document.getElementById('startNum').value) + i + j, tx, ty);
                }
                ctx.fillStyle = document.getElementById('fColor').value;
                ctx.fillText(parseInt(document.getElementById('startNum').value) + i + j, tx, ty);
                ctx.restore();
            }
            const resImg = document.createElement('img');
            resImg.src = canvas.toDataURL("image/jpeg", parseInt(document.getElementById('quality').value)/100);
            container.appendChild(resImg);
        }
    }

    function loadImage(url) { return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = url; }); }
</script>
</body>
</html>
